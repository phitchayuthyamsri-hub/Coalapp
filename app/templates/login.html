{% extends "base.html" %}
{% block body %}
<div class="authbox">
  <h1>Please login</h1>
  <form method="post" action="{{ url_for('auth.login') }}">
    <input name="username" placeholder="Username" autofocus>
    <input name="password" type="password" placeholder="Password">
    <button type="submit">Log in</button>
  </form>
</div>
{% endblock %}
