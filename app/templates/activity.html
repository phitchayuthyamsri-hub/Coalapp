<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin · Activity</title>
<style>
  :root{ --bg:#0b0b0c; --panel:#161618; --panel2:#1f1f22; --line:#2a2a2e; --ink:#e6e6ea; --mut:#8a8f98; --grn:#34c759; --blue:#0a84ff; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,system-ui,Segoe UI,Roboto,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
  header h1{font-size:16px;margin:0}
  header .sp{flex:1}
  a.btn{color:var(--ink);text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:6px 12px}
  a.btn:hover{border-color:var(--mut)}
  .wrap{padding:18px;max-width:1050px;margin:0 auto}
  .note{color:var(--mut);font-size:13px;margin:0 0 16px}
  .user{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin:0 0 14px}
  .uhead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  .uname{font-weight:600;font-size:16px}
  .total{color:var(--mut);font-size:13px}
  .cols{display:grid;grid-template-columns:1.2fr .8fr;gap:22px}
  @media(max-width:740px){.cols{grid-template-columns:1fr}}
  h3{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin:0 0 8px}
  .bar{display:grid;grid-template-columns:150px 1fr 70px;align-items:center;gap:10px;margin:4px 0;font-size:13px}
  .bar .track{background:var(--panel2);border-radius:5px;height:14px;overflow:hidden}
  .bar .fill{background:var(--blue);height:100%}
  .bar .v{color:var(--mut);text-align:right;font-variant-numeric:tabular-nums}
  .ctry{display:flex;justify-content:space-between;gap:8px;font-size:13px;padding:3px 0;border-bottom:1px solid var(--line)}
  .ctry .n{color:var(--mut)}
  .logins{font-size:12px;color:var(--mut);margin-top:10px}
  .logins div{padding:2px 0}
  .err{color:#ff6b6b}
</style>
</head>
<body>
<header>
  <h1>Activity</h1>
  <div class="sp"></div>
  <a class="btn" href="/admin">Users</a>
  <a class="btn" href="/tool">← Tool</a>
  <a class="btn" href="/logout">Log out</a>
</header>
<div class="wrap">
  <p class="note">Per-user usage: which areas they spend the most time in, total time, and where they log in from (approximate, by IP). Time is aggregated from the tool; country is recorded at login. Login times shown in UTC+7 (Indochina).</p>
  <div id="list">Loading…</div>
</div>

<script>
const LABEL = {
  perf:'Performance', daily:'Daily performance', pva:'Plan vs Actual', subfleet:'Subcontractor fleet status',
  anchors:'Parameter', data:'Sequence/Route', 'data:sequence':'Sequence', 'data:route':'Route', 'data:timeline':'Timeline',
  gps:'GPS Data', plan:'Dispatch Plan', truckstatus:'Truck Status', weigh:'Weighbridge', fleet:'Fleet', guide:'Guide'
};
const lab = p => LABEL[p] || p;
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function dur(sec){ sec=Math.round(sec||0); if(sec<60) return sec+'s'; const m=Math.round(sec/60); if(m<60) return m+'m'; const h=Math.floor(m/60); return h+'h '+(m%60)+'m'; }
function fmtTs(iso){ if(!iso) return '—'; const d=new Date(/[zZ]|[+-]\d\d:?\d\d$/.test(iso)?iso:iso+'Z'); if(isNaN(d)) return esc(String(iso).replace('T',' ').slice(0,16)); const p=new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(d); const g=t=>(p.find(x=>x.type===t)||{}).value||'00'; return g('year')+'-'+g('month')+'-'+g('day')+' '+g('hour')+':'+g('minute'); }
function flag(cc){ if(!cc||cc.length!==2) return ''; return cc.toUpperCase().replace(/./g,c=>String.fromCodePoint(127397+c.charCodeAt(0)))+' '; }

function userBlock(name, u){
  const max = Math.max(1, ...(u.areas.map(a=>a.seconds)));
  const bars = u.areas.map(a =>
    '<div class="bar"><span>'+esc(lab(a.page))+'</span><div class="track"><div class="fill" style="width:'+Math.round(a.seconds/max*100)+'%"></div></div><span class="v">'+dur(a.seconds)+'</span></div>'
  ).join('') || '<div class="note">No usage recorded yet.</div>';
  const ctry = u.countries.map(c =>
    '<div class="ctry"><span>'+flag(c.code)+esc(c.country)+'</span><span class="n">'+c.count+' login'+(c.count>1?'s':'')+'</span></div>'
  ).join('') || '<div class="note">No logins recorded.</div>';
  const logins = u.logins.slice(0,8).map(l =>
    '<div>'+fmtTs(l.ts)+' · '+esc(l.country)+' · '+esc(l.ip)+'</div>'
  ).join('');
  return '<div class="user"><div class="uhead"><span class="uname">'+esc(name)+'</span><span class="total">total '+dur(u.total_seconds)+'</span></div>'
    + '<div class="cols"><div><h3>Time by area (most used first)</h3>'+bars+'</div>'
    + '<div><h3>Logged in from</h3>'+ctry+'<div class="logins"><h3>Recent logins</h3>'+(logins||'<div>—</div>')+'</div></div></div></div>';
}

fetch('/api/admin/activity').then(r=>{
  if(r.status===403){ document.getElementById('list').innerHTML='<p class="err">Admins only.</p>'; return null; }
  return r.json();
}).then(data=>{
  if(!data) return;
  const names = Object.keys(data).sort((a,b)=>data[b].total_seconds-data[a].total_seconds);
  const el = document.getElementById('list');
  el.innerHTML = names.length ? names.map(n=>userBlock(n,data[n])).join('') : '<p class="note">No activity yet.</p>';
}).catch(()=>{ document.getElementById('list').innerHTML='<p class="err">Could not load activity.</p>'; });
</script>
</body>
</html>
